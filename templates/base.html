<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Burrow{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f5f0;
      --surface: #ffffff;
      --surface-raised: #fdfcfa;
      --border: #e8e2d9;
      --border-strong: #d4ccc0;
      --text: #2c2416;
      --text-secondary: #7a6e5f;
      --text-muted: #a89d8e;
      --accent: #c2752e;
      --accent-hover: #a8631f;
      --accent-bg: #fdf4ec;
      --accent-border: #f0d4b5;
      --download: #3d7a5a;
      --download-bg: #ecf5f0;
      --download-border: #b5deca;
      --upload: #b8860b;
      --upload-bg: #fdf8ec;
      --upload-border: #e8d9a0;
      --both: #6b5b95;
      --both-bg: #f2eff8;
      --both-border: #cfc8e8;
      --danger: #b44a3f;
      --danger-bg: #fdf0ee;
      --danger-border: #e8b5b0;
      --radius: 6px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Outfit', system-ui, sans-serif;
      --font-mono: 'Fira Code', 'Menlo', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      max-width: 940px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }
    nav {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }
    nav .brand {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
    }
    nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    h2 {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    td { font-size: 0.88rem; }
    code, .mono {
      font-family: var(--font-mono);
      font-size: 0.85em;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }
    .btn:hover { background: var(--surface-raised); border-color: var(--border-strong); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-danger { color: var(--danger); border-color: var(--danger-border); }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      color: var(--text);
    }
    .form-group .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }
    .form-group input:disabled {
      background: var(--bg);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-download { background: var(--download-bg); color: var(--download); border: 1px solid var(--download-border); }
    .badge-upload { background: var(--upload-bg); color: var(--upload); border: 1px solid var(--upload-border); }
    .badge-both { background: var(--both-bg); color: var(--both); border: 1px solid var(--both-border); }
    .badge-active { background: var(--download-bg); color: var(--download); border: 1px solid var(--download-border); }
    .badge-disabled { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .flex { display: flex; align-items: center; justify-content: space-between; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .url-box {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
      max-width: 100%;
    }
    .url-box a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .url-box a:hover { text-decoration: underline; }
    .share-row {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
    }
    .share-row:last-child { border-bottom: none; }
    .share-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .share-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .share-header-left strong {
      font-size: 1rem;
    }
    .share-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .share-meta .label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-right: 0.35rem;
    }
    .share-link-row {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
    }
    .share-link-row .qr {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem;
    }
    .share-link-row .qr svg { display: block; }
    .share-link-row .link-info { flex: 1; min-width: 0; }
    .share-link-row .link-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .share-link-row .link-url {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.5;
    }
    .share-link-row .link-url a {
      color: inherit;
      text-decoration: none;
    }
    .share-link-row .link-url a:hover { text-decoration: underline; }
    .share-link-row .link-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    @media (max-width: 600px) {
      .form-row { flex-direction: column; gap: 0; }
      .share-link-row { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">Burrow</a>
    <a href="/admin/shares">Shares</a>
    <a href="/admin/shares/new">New Share</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
