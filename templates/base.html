<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Burrow{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #f5f5f5;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
    nav a { text-decoration: none; color: #2563eb; font-weight: 600; margin-right: 1rem; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; }
    th { font-weight: 600; font-size: 0.85rem; text-transform: uppercase; color: #666; }
    .btn {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      color: #1a1a1a;
    }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger { color: #dc2626; border-color: #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 0.2rem 0.6rem; font-size: 0.8rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.25rem; font-size: 0.9rem; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-gray { background: #f3f4f6; color: #374151; }
    .muted { color: #888; font-size: 0.85rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .flex { display: flex; align-items: center; justify-content: space-between; }
    .empty { text-align: center; padding: 3rem; color: #888; }
    .url-box {
      display: inline-block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #166534;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Burrow</a>
    <a href="/admin/shares">Shares</a>
    <a href="/admin/shares/new">New Share</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
