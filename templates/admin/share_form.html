{% extends "base.html" %}
{% block title %}Burrow — New Share{% endblock %}
{% block content %}
<h1>New Share</h1>

<div class="card">
  <form hx-post="/admin/shares"
        hx-target="#result"
        hx-swap="innerHTML">
    <div class="form-row">
      <div class="form-group">
        <label for="id">Share ID</label>
        <input type="text" id="id" name="id" required placeholder="e.g. docs">
        <div class="hint">A short name to identify this share</div>
      </div>
      <div class="form-group">
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="download">Download</option>
          <option value="upload">Upload</option>
          <option value="both">Both</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="path">Directory Path</label>
      <input type="text" id="path" name="path" required placeholder="/absolute/path/to/folder">
      <div class="hint">Absolute path to the folder to share</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="expires">Expires</label>
        <input type="text" id="expires" name="expires" placeholder="e.g. 24h, 7d">
        <div class="hint">Suffix: s, m, h, d</div>
      </div>
      <div class="form-group">
        <label for="max_upload_size">Max Upload Size</label>
        <input type="text" id="max_upload_size" name="max_upload_size" placeholder="100MB">
        <div class="hint">Default: 100MB</div>
      </div>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" name="allow_archive" value="true">
        Allow archive download (.zip)
      </label>
    </div>

    <div style="display: flex; gap: 0.5rem;">
      <button type="submit" class="btn btn-primary">Create Share</button>
      <a href="/admin/shares" class="btn">Cancel</a>
    </div>
  </form>

  <div id="result" style="margin-top: 1rem;"></div>
</div>
{% endblock %}
